version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: dotnet-grpc-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grpc_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grpc_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grpc-gateway-network

  # dotnet-grpc-gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dotnet-grpc-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5000
      Gateway__Port: "5000"
      Gateway__MaxConcurrentConnections: "1000"
      Gateway__RequestTimeoutMs: "30000"
      Logging__LogLevel__Default: Information
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=grpc_gateway;Username=postgres;Password=postgres"
    ports:
      - "5000:5000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - grpc-gateway-network

volumes:
  postgres_data:
    driver: local

networks:
  grpc-gateway-network:
    driver: bridge
